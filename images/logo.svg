<svg viewBox="0 0 500 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Wellness check illustration">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EAF7F7"/>
      <stop offset="100%" stop-color="#D7EFEF"/>
    </linearGradient>
  </defs>

  <!-- background circle -->
  <circle cx="250" cy="210" r="190" fill="url(#bgGrad)"/>

  <!-- clipboard -->
  <rect x="150" y="90" width="150" height="200" rx="18" fill="#FFFFFF" stroke="#6EC6CA" stroke-width="4"/>
  <rect x="195" y="78" width="60" height="24" rx="8" fill="#A8DADC"/>

  <!-- checklist lines -->
  <rect x="175" y="140" width="100" height="10" rx="5" fill="#E1EEEE"/>
  <rect x="175" y="165" width="80" height="10" rx="5" fill="#E1EEEE"/>
  <rect x="175" y="190" width="90" height="10" rx="5" fill="#E1EEEE"/>

  <!-- checkmarks -->
  <circle cx="185" cy="230" r="10" fill="#8BC34A"/>
  <path d="M180 230 L184 234 L191 226" stroke="#FFFFFF" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="200" y="224" width="70" height="10" rx="5" fill="#E1EEEE"/>

  <circle cx="185" cy="258" r="10" fill="#8BC34A"/>
  <path d="M180 258 L184 262 L191 254" stroke="#FFFFFF" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="200" y="252" width="60" height="10" rx="5" fill="#E1EEEE"/>

  <!-- heart pulse icon -->
  <g transform="translate(310, 250)">
    <circle cx="0" cy="0" r="42" fill="#FFE8A3"/>
    <path d="M-18 2 L-8 2 L-3 -10 L4 12 L10 -4 L14 2 L20 2"
          stroke="#EF5350" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- small floating dots -->
  <circle cx="120" cy="330" r="8" fill="#6EC6CA"/>
  <circle cx="360" cy="120" r="6" fill="#A8DADC"/>
  <circle cx="90" cy="140" r="5" fill="#FFE8A3"/>
</svg>
